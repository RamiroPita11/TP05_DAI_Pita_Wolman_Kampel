<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="estilo.css">
    <title>Mini Pokédex</title>
</head>

<body>

    <h1>Mini Pokédex</h1>

    <input type="text" id="pokemonInput" placeholder="Escribí un Pokémon..." />
    <button id="search">Buscar</button>

    <p id="loading" style="display: none;">Cargando...</p>
    <p id="error"></p>

    <div id="result">
        <h2 id="name"></h2>
        <img id="sprite" src="" alt="" />
        <p><strong>Tipo:</strong> <span id="type"></span></p>
        <p><strong>Peso:</strong> <span id="weight"></span></p>
        <p><strong>Altura:</strong> <span id="height"></span></p>
    </div>

    <script src="index.js"></script>
</body>

</html>
